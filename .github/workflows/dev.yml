name: Build Dev APK

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0 cmake;3.22.1 ndk;25.2.9519653'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Publish debug APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: debug-${{ github.sha }}
          name: "Debug build ${{ github.sha }}"
          prerelease: true
          files: ImguiDemoSdl/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
